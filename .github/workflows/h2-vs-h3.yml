name: h2-vs-h3
# Diagnostic: does HTTP/3 change the request header order vs HTTP/2?
# No local server needed — Chrome's own net-log records the exact headers it
# sends (order + pseudo-headers). We force QUIC to a real public h3 server
# (valid cert, no handshake issues) for the h3 run, and use plain h2 otherwise,
# then read both header lists from the net-logs.
on:
  workflow_dispatch:
    inputs:
      host:
        description: "an h3-capable host to probe"
        default: "cloudflare-quic.com"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: drive chrome over h2 and h3, capture net-logs
        run: |
          set -x
          HOST="${{ github.event.inputs.host || 'cloudflare-quic.com' }}"
          CH=/opt/google/chrome/google-chrome
          COMMON="--headless=new --no-sandbox --disable-gpu --no-first-run"
          # h2: normal HTTPS (QUIC disabled so it stays on h2)
          $CH $COMMON --disable-quic --log-net-log=/tmp/h2.json \
            --user-data-dir=/tmp/u_h2 --dump-dom "https://$HOST/" >/dev/null 2>&1 || true
          sleep 2
          # h3: force QUIC to the real server
          $CH $COMMON --enable-quic --origin-to-force-quic-on="$HOST:443" --log-net-log=/tmp/h3.json \
            --user-data-dir=/tmp/u_h3 --dump-dom "https://$HOST/" >/dev/null 2>&1 || true
      - name: compare header order h2 vs h3
        env:
          HOST: ${{ github.event.inputs.host || 'cloudflare-quic.com' }}
        run: |
          echo "===== HTTP/2 ====="; python3 diag/parse_netlog.py /tmp/h2.json "$HOST"
          echo "===== HTTP/3 ====="; python3 diag/parse_netlog.py /tmp/h3.json "$HOST"
          python3 - <<'PY'
          import subprocess, ast, os
          HOST = os.environ["HOST"]
          def order(p):
              out = subprocess.check_output(["python3", "diag/parse_netlog.py", p, HOST]).decode()
              for line in out.splitlines():
                  if line.startswith("order:"):
                      return ast.literal_eval(line.split("order:", 1)[1].strip())
              return None
          h2, h3 = order("/tmp/h2.json"), order("/tmp/h3.json")
          print("\nh2:", h2)
          print("h3:", h3)
          if h2 and h3:
              print("\nSAME header order (incl. pseudo):", h2 == h3)
              if h2 != h3:
                  import itertools
                  for i,(a,b) in enumerate(itertools.zip_longest(h2,h3)):
                      if a != b: print("  first diff at %d: h2=%s h3=%s" % (i,a,b))
                  print("  only in h2:", [x for x in h2 if x not in h3])
                  print("  only in h3:", [x for x in h3 if x not in h2])
          else:
              print("\nmissing data — h2:", bool(h2), "h3:", bool(h3))
          PY
