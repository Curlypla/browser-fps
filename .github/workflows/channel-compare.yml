name: channel-compare
# Diagnostic: does the release channel (stable/beta/dev) change the network
# fingerprint within the same milestone? Capture milestone 149 from all three
# channels on one runner and compare.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet websocket-client
      - name: stable 149 (NDViet deb)
        run: |
          python3 scripts/capture.py --browser c_stable --version 149.0.7827.155 \
            --kind deb --engine chromium --binary /opt/google/chrome/google-chrome \
            --url "https://github.com/NDViet/google-chrome-stable/releases/download/149.0.7827.155-1/google-chrome-stable_149.0.7827.155-1_amd64.deb" \
            --captured-at stable
      - name: beta 149 (official deb)
        run: |
          python3 scripts/capture.py --browser c_beta --version 149.0.7827.53 \
            --kind deb --engine chromium --binary /opt/google/chrome-beta/google-chrome-beta \
            --url "https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-beta/google-chrome-beta_149.0.7827.53-1_amd64.deb" \
            --captured-at beta
      - name: dev 149 (official deb)
        run: |
          python3 scripts/capture.py --browser c_dev --version 149.0.7815.2 \
            --kind deb --engine chromium --binary /opt/google/chrome-unstable/google-chrome-unstable \
            --url "https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-unstable/google-chrome-unstable_149.0.7815.2-1_amd64.deb" \
            --captured-at dev
      - name: Compare
        run: |
          python3 - <<'PY'
          import json, glob
          load = lambda pat: json.load(open(glob.glob(pat)[0]))
          s, b, d = load("results/c_stable__*"), load("results/c_beta__*"), load("results/c_dev__*")
          def h2(x): return x.get("h2") or {}
          print("UA stable:", s.get("user_agent"))
          print("UA beta  :", b.get("user_agent"))
          print("UA dev   :", d.get("user_agent"))
          for f in ("ja4", "ja4_r", "akamai_fingerprint", "peetprint_hash"):
              sv, bv, dv = h2(s).get(f), h2(b).get(f), h2(d).get(f)
              ok = (sv == bv == dv)
              print("\n%-20s %s" % (f, "ALL SAME" if ok else "DIFFER"))
              print("   stable:", sv)
              print("   beta  :", bv)
              print("   dev   :", dv)
          so, bo, do = (h2(s).get("header_orders") or {}), (h2(b).get("header_orders") or {}), (h2(d).get("header_orders") or {})
          print()
          for k in sorted(set(so) | set(bo) | set(do)):
              if k.startswith("_"): continue
              print("header_order[%s] %s" % (k, "SAME" if so.get(k) == bo.get(k) == do.get(k) else "DIFFER"))
          PY
