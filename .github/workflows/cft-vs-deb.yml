name: cft-vs-deb
# Diagnostic: capture the SAME Chrome version from the real NDViet .deb and from
# the Chrome-for-Testing linux64 build, on the same runner, and compare their
# fingerprints. Tells us whether CfT is a faithful stand-in for real Chrome.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "clean Chrome version present in both NDViet and CfT"
        default: "149.0.7827.155"
      deb_tag:
        description: "NDViet release tag (with -N)"
        default: "149.0.7827.155-1"

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet websocket-client
      - name: Capture via real Chrome .deb (NDViet)
        run: |
          python3 scripts/capture.py --browser chrome_deb --version "${{ github.event.inputs.version }}" \
            --kind deb --engine chromium --binary /opt/google/chrome/google-chrome \
            --url "https://github.com/NDViet/google-chrome-stable/releases/download/${{ github.event.inputs.deb_tag }}/google-chrome-stable_${{ github.event.inputs.deb_tag }}_amd64.deb" \
            --captured-at deb
      - name: Capture via Chrome-for-Testing (CfT) zip
        run: |
          python3 scripts/capture.py --browser chrome_cft --version "${{ github.event.inputs.version }}" \
            --kind cft --engine chromium --binary "" \
            --url "https://storage.googleapis.com/chrome-for-testing-public/${{ github.event.inputs.version }}/linux64/chrome-linux64.zip" \
            --captured-at cft
      - name: Compare
        run: |
          python3 - <<'PY'
          import json, glob
          def load(p): return json.load(open(p))
          deb = load(glob.glob("results/chrome_deb__*.json")[0])
          cft = load(glob.glob("results/chrome_cft__*.json")[0])
          def h2(d): return d.get("h2") or {}
          print("=== UA ===")
          print(" deb:", deb.get("user_agent"))
          print(" cft:", cft.get("user_agent"))
          for f in ("ja4", "ja4_r", "akamai_fingerprint", "peetprint_hash"):
              dv, cv = h2(deb).get(f), h2(cft).get(f)
              print("%-20s %s" % (f, "SAME" if dv == cv else "DIFFERENT"))
              print("   deb:", dv)
              print("   cft:", cv)
          do = (h2(deb).get("header_orders") or {})
          co = (h2(cft).get("header_orders") or {})
          for k in sorted(set(do) | set(co)):
              if k.startswith("_"): continue
              print("header_order[%s] %s" % (k, "SAME" if do.get(k) == co.get(k) else "DIFFERENT"))
          PY
